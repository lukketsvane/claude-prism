name: Build Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        if: matrix.label == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libfontconfig-dev libfreetype-dev libicu-dev libgraphite2-dev libharfbuzz-dev

      - name: Install macOS dependencies
        if: contains(matrix.label, 'macos')
        run: brew install icu4c harfbuzz pkg-config

      - name: Set macOS build environment
        if: contains(matrix.label, 'macos')
        run: |
          echo "PKG_CONFIG_PATH=$(brew --prefix icu4c)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "CXXFLAGS=-I$(brew --prefix)/include -std=c++17" >> $GITHUB_ENV
          echo "CFLAGS=-I$(brew --prefix)/include" >> $GITHUB_ENV

      - name: Restore vcpkg cache
        if: matrix.label == 'windows'
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
          key: vcpkg-win-static-release-harfbuzz-fontconfig-freetype-icu-v1

      - name: Install Windows dependencies (vcpkg)
        if: matrix.label == 'windows' && steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          VCPKG_BINARY_SOURCES: "clear"
        run: |
          vcpkg install "harfbuzz[graphite2]:x64-windows-static-release" \
            fontconfig:x64-windows-static-release \
            freetype:x64-windows-static-release \
            icu:x64-windows-static-release

      - name: Save vcpkg cache
        if: matrix.label == 'windows' && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
          key: vcpkg-win-static-release-harfbuzz-fontconfig-freetype-icu-v1

      - name: Set Windows build environment
        if: matrix.label == 'windows'
        shell: bash
        run: |
          echo "TECTONIC_DEP_BACKEND=vcpkg" >> $GITHUB_ENV
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV
          echo "VCPKGRS_TRIPLET=x64-windows-static-release" >> $GITHUB_ENV
          echo "VCPKG_DEFAULT_HOST_TRIPLET=x64-windows-static-release" >> $GITHUB_ENV
          echo "RUSTFLAGS=-Ctarget-feature=+crt-static" >> $GITHUB_ENV
          # Override macOS-specific paths from .cargo/config.toml; ICU 78+ requires C++17
          echo "CXXFLAGS=/std:c++17" >> $GITHUB_ENV
          echo "CFLAGS=" >> $GITHUB_ENV

      - name: Setup Apple code signing
        id: signing
        if: contains(matrix.label, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::warning::Apple signing certificate not configured. Building without signing."
            echo "available=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERT_PATH

          security create-keychain -p "actions" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions" $KEYCHAIN_PATH

          if security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH; then
            security set-key-partition-list -S apple-tool:,apple: \
              -k "actions" $KEYCHAIN_PATH
            security list-keychain -d user -s $KEYCHAIN_PATH
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Failed to import certificate. Building without signing."
            security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build and release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} ${{ contains(matrix.label, 'macos') && steps.signing.outputs.available != 'true' && '--no-sign' || '' }}
          tagName: ${{ github.ref_name }}
          releaseName: "ClaudePrism ${{ github.ref_name }}"
          releaseBody: "Release is being built..."
          releaseDraft: false
          prerelease: false

      - name: Build only (no release)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} ${{ contains(matrix.label, 'macos') && steps.signing.outputs.available != 'true' && '--no-sign' || '' }}

      - name: Upload artifacts (manual builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz*
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage*
          if-no-files-found: warn

  update-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog and update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p' || true)
          REPO="${{ github.repository }}"
          ICON_URL="https://raw.githubusercontent.com/${REPO}/main/apps/desktop/src-tauri/icons/icon.png"

          # Build categorized changelog
          FEAT="" FIX="" CHORE="" OTHER=""
          if [ -n "$PREV_TAG" ]; then
            while IFS= read -r line; do
              msg="${line#- }"
              case "$msg" in
                feat:*|feat\(*) FEAT="${FEAT}\n- ${msg}" ;;
                fix:*|fix\(*)   FIX="${FIX}\n- ${msg}" ;;
                chore:*|chore\(*|docs:*|docs\(*|ci:*|ci\(*|build:*|build\(*) CHORE="${CHORE}\n- ${msg}" ;;
                *)              OTHER="${OTHER}\n- ${msg}" ;;
              esac
            done < <(git log --pretty=format:"- %s" "$PREV_TAG".."$TAG" --no-merges 2>/dev/null)
            COMPARE_URL="https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
          fi

          CHANGELOG=""
          if [ -n "$FEAT" ]; then
            CHANGELOG="${CHANGELOG}#### New Features\n${FEAT}\n\n"
          fi
          if [ -n "$FIX" ]; then
            CHANGELOG="${CHANGELOG}#### Bug Fixes\n${FIX}\n\n"
          fi
          if [ -n "$OTHER" ]; then
            CHANGELOG="${CHANGELOG}#### Other Changes\n${OTHER}\n\n"
          fi
          if [ -n "$CHORE" ]; then
            CHANGELOG="${CHANGELOG}<details>\n<summary>Maintenance</summary>\n\n${CHORE}\n</details>\n\n"
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Initial release\n"
          fi

          # Get contributors for this release
          CONTRIBUTORS=""
          if [ -n "$PREV_TAG" ]; then
            CONTRIBUTORS=$(git log --pretty=format:"%an" "$PREV_TAG".."$TAG" --no-merges | sort -u | while read -r name; do
              # Try to find GitHub username from commit
              email=$(git log --pretty=format:"%ae" --author="$name" -1 "$PREV_TAG".."$TAG")
              gh_user=$(echo "$email" | sed -n 's/.*+\(.*\)@users.noreply.github.com/\1/p')
              if [ -z "$gh_user" ]; then
                gh_user=$(gh api "search/users?q=${email}+in:email" --jq '.items[0].login' 2>/dev/null || true)
              fi
              if [ -n "$gh_user" ]; then
                echo "<a href=\"https://github.com/${gh_user}\"><img src=\"https://github.com/${gh_user}.png\" width=\"40\" height=\"40\" style=\"border-radius:50%\" alt=\"@${gh_user}\" /></a>"
              else
                echo "**${name}**"
              fi
            done | tr '\n' ' ')
          fi
          if [ -z "$CONTRIBUTORS" ]; then
            CONTRIBUTORS="<a href=\"https://github.com/${REPO}/graphs/contributors\">View all contributors</a>"
          fi

          # Build release body
          cat > release-body.md << BODY_EOF
          <p align="center">
            <img src="${ICON_URL}" width="120" height="120" alt="ClaudePrism" />
          </p>

          <h2 align="center">ClaudePrism ${TAG}</h2>

          ---

          ### What's Changed

          $(echo -e "$CHANGELOG")

          ---

          ### Downloads

          | Platform | Architecture | File | Install |
          |:--------:|:------------:|:----:|:--------|
          | **Windows** | x64 | \`.msi\` / \`.exe\` | Run the installer |
          | **macOS** | Apple Silicon | \`.dmg\` | Open \`.dmg\` → drag to Applications |
          | **macOS** | Any | **Homebrew** | \`brew install --cask claude-prism\` |
          | **Linux** | x64 | \`.AppImage\` | \`chmod +x\` and run |
          | **Linux** | x64 | \`.deb\` | \`sudo dpkg -i claude-prism_*.deb\` |

          ---

          ### Contributors

          <p align="center">
          ${CONTRIBUTORS}
          </p>

          ---

          <p align="center">
          $([ -n "$PREV_TAG" ] && echo "<a href=\"${COMPARE_URL}\">Full Changelog (${PREV_TAG}...${TAG})</a>" || echo "Initial Release")
          </p>
          BODY_EOF

          gh release edit "$TAG" \
            --repo "${REPO}" \
            --notes-file release-body.md

      - name: Update Homebrew Cask SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Download DMG files
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "*.dmg" \
            --dir /tmp/dmg

          # Calculate SHA256
          SHA_ARM64=$(sha256sum /tmp/dmg/ClaudePrism_${VERSION}_aarch64.dmg | awk '{print $1}')

          echo "ARM64 SHA256: $SHA_ARM64"

          # Update Cask file
          CASK_FILE="homebrew/Casks/claude-prism.rb"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$CASK_FILE"
          sed -i "s/sha256 \".*\"/sha256 \"${SHA_ARM64}\"/" "$CASK_FILE"

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CASK_FILE"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update Homebrew Cask to ${TAG}"
          git push origin HEAD:main
